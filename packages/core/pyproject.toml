[project]
name = "kpi-perf-summary-core"
version = "0.1.0"
description = "Shared domain core for the Public Investor KPI Performance Summary app"
requires-python = ">=3.11"
dependencies = [
    "sqlalchemy[asyncio]>=2.0.51",
    "asyncpg>=0.29.0",
    "pydantic>=2.7.0",
    "pydantic-settings>=2.3.0",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["kpi_perf_summary_core*"]
