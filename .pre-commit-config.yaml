# Local commit gates. Install once with:  uvx pre-commit install
# Run across the whole repo with:          uvx pre-commit run --all-files
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17 # keep in sync with the ruff version in pyproject.toml dev group
    hooks:
      - id: ruff # lint (auto-fix what it can)
        args: [--fix]
      - id: ruff-format # format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: detect-private-key # never commit a key/secret
